<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programacion Estructurada</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
    
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .contenedor {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        .objetivo {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #cbd5e1;
        }

        .grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            
        }

        .card {
            width: 500px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            transition: 0.4s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(56, 189, 248, 0.2);
        }

        .card h2 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .card p {
            color: #e2e8f0;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <h1>Programacion Estructurada</h1>

        <p class="objetivo">
            Objetivo: Aplicar conocimento aprendido en clase con los diferentes casos expuestos
        </p>

        <div class="grid">

            <div class="card">
                <a href="Sentencia.html" target="_blank">

                    <h2>Sentencias de Control</h2>
                    
            </div>
            </a>
            <div class="card">
                <a href="Bucles.html" target="_blank">

                    <h2>Bucles</h2>
                    
            </div>
            </a>
            <div class="card">
                <a href="Funciones.html" target="_blank">

                    <h2>Funciones</h2>
                    
            </div>
            </a>
            <div class="card">
                <a href="Arreglos.html" target="_blank">

                    <h2>Arreglos</h2>
                    
            </div>
            </a>
            <div class="card">
                <a href="Litas.html" target="_blank">

                    <h2>Listas</h2>
                    
            </div>
            </a>




        </div>
    </div>

</body>

</html>
