<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programación Estructurada - Funciones</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            padding: 30px;
        }

        .contenedor {
            max-width: 1000px;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        .objetivo {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #cbd5e1;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }

        .card h2 {
            color: #38bdf8;
            margin-bottom: 15px;
        }

        iframe {
            width: 100%;
            height: 360px;
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
